<svg width="100%" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg" style="font-family:sans-serif;background:#fafafa">
<rect width="680" height="460" fill="#fafafa" rx="12"/>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<text font-size="13" font-weight="600" x="340" y="28" text-anchor="middle" fill="#1a1a1a">Project 4 — World Bank Economic Indicators Pipeline (dbt + Snowflake)</text>
<text font-size="11" fill="#888" x="28" y="80" text-anchor="middle">Source</text>
<text font-size="11" fill="#888" x="28" y="160" text-anchor="middle">Ingest</text>
<text font-size="11" fill="#888" x="28" y="240" text-anchor="middle">Process</text>
<text font-size="11" fill="#888" x="28" y="310" text-anchor="middle">Stage</text>
<text font-size="11" fill="#888" x="28" y="385" text-anchor="middle">Warehouse</text>
<line x1="55" y1="110" x2="645" y2="110" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="4 3"/>
<line x1="55" y1="190" x2="645" y2="190" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="4 3"/>
<line x1="55" y1="270" x2="645" y2="270" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="4 3"/>
<line x1="55" y1="340" x2="645" y2="340" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="4 3"/>
<!-- Source -->
<rect x="62" y="46" width="260" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="12" font-weight="600" x="192" y="68" text-anchor="middle" fill="#085041">World Bank Open Data API</text>
<text font-size="11" x="192" y="86" text-anchor="middle" fill="#0F6E56">free · no API key · api.worldbank.org/v2</text>
<rect x="340" y="50" width="72" height="32" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="11" x="376" y="70" text-anchor="middle" fill="#085041">8 indicators</text>
<rect x="420" y="50" width="72" height="32" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="11" x="456" y="70" text-anchor="middle" fill="#085041">30 countries</text>
<rect x="500" y="50" width="72" height="32" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="11" x="536" y="70" text-anchor="middle" fill="#085041">30+ years</text>
<!-- Source to Kafka -->
<line x1="376" y1="82" x2="340" y2="130" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="456" y1="82" x2="380" y2="130" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="536" y1="82" x2="420" y2="130" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="192" y1="98" x2="240" y2="130" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrow)"/>
<!-- Kafka -->
<rect x="62" y="130" width="520" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-size="12" font-weight="600" x="322" y="156" text-anchor="middle" fill="#3C3489">Kafka: batch-worldbank-indicators  |  GZIP  |  key: country_indicator_year</text>
<!-- Kafka to Spark -->
<line x1="322" y1="174" x2="322" y2="200" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- Spark -->
<rect x="62" y="200" width="520" height="50" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text font-size="12" font-weight="600" x="322" y="220" text-anchor="middle" fill="#0C447C">PySpark Batch Transform</text>
<text font-size="11" x="322" y="238" text-anchor="middle" fill="#185FA5">pivot indicators  →  YoY growth (window)  →  income group classification  →  is_digital_ready</text>
<!-- Airflow badge -->
<rect x="558" y="200" width="84" height="50" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text font-size="12" font-weight="600" x="600" y="220" text-anchor="middle" fill="#633806">Airflow</text>
<text font-size="11" x="600" y="238" text-anchor="middle" fill="#854F0B">daily 03:00 WIB</text>
<!-- Spark to Postgres -->
<line x1="322" y1="250" x2="322" y2="280" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- Postgres staging -->
<rect x="62" y="280" width="520" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-size="12" font-weight="600" x="322" y="300" text-anchor="middle" fill="#444441">PostgreSQL staging: stg_worldbank_indicators</text>
<!-- Postgres to dbt -->
<line x1="322" y1="324" x2="322" y2="350" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- dbt layer -->
<rect x="62" y="350" width="290" height="80" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text font-size="12" font-weight="600" x="207" y="370" text-anchor="middle" fill="#27500A">dbt Core (3-layer)</text>
<text font-size="11" x="207" y="388" text-anchor="middle" fill="#3B6D11">staging → intermediate → marts</text>
<text font-size="11" x="207" y="404" text-anchor="middle" fill="#3B6D11">economic_health_score composite index</text>
<!-- dbt to Snowflake -->
<path d="M352 392 L420 392" fill="none" stroke="#3B6D11" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- Snowflake -->
<rect x="420" y="350" width="162" height="80" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="12" font-weight="600" x="501" y="372" text-anchor="middle" fill="#085041">Snowflake</text>
<text font-size="11" x="501" y="390" text-anchor="middle" fill="#0F6E56">WORLD_BANK_DW</text>
<text font-size="11" x="501" y="406" text-anchor="middle" fill="#0F6E56">clustered by country+year</text>
<!-- SLA badge -->
<rect x="590" y="350" width="75" height="36" rx="4" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text font-size="10" x="628" y="364" text-anchor="middle" fill="#633806">~36,000 rows</text>
<text font-size="10" x="628" y="378" text-anchor="middle" fill="#633806">per run</text>
</svg>
