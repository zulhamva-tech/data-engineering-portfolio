<svg width="100%" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg" style="font-family:sans-serif;background:#fff">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<rect width="680" height="460" fill="#fafafa" rx="12"/>
<!-- Title -->
<text font-size="13" font-weight="600" x="340" y="28" text-anchor="middle" fill="#1a1a1a">Project 2 — Daily Batch Data Ingestion Pipeline</text>
<!-- Layer labels -->
<text font-size="11" fill="#888" x="28" y="90"  text-anchor="middle">Source</text>
<text font-size="11" fill="#888" x="28" y="182" text-anchor="middle">Ingest</text>
<text font-size="11" fill="#888" x="28" y="262" text-anchor="middle">Process</text>
<text font-size="11" fill="#888" x="28" y="342" text-anchor="middle">Stage</text>
<text font-size="11" fill="#888" x="28" y="420" text-anchor="middle">Warehouse</text>
<!-- Lane lines -->
<line x1="55" y1="134" x2="645" y2="134" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="4 3"/>
<line x1="55" y1="216" x2="645" y2="216" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="4 3"/>
<line x1="55" y1="296" x2="645" y2="296" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="4 3"/>
<line x1="55" y1="376" x2="645" y2="376" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="4 3"/>
<!-- GitHub API -->
<rect x="62" y="56" width="230" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-size="12" font-weight="600" x="177" y="78" text-anchor="middle" fill="#712B13">GitHub REST API</text>
<text font-size="11" x="177" y="96" text-anchor="middle" fill="#993C1D">150 repos × 5 languages / day</text>
<!-- Open-Meteo Historical -->
<rect x="368" y="56" width="250" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="12" font-weight="600" x="493" y="78" text-anchor="middle" fill="#085041">Open-Meteo Historical</text>
<text font-size="11" x="493" y="96" text-anchor="middle" fill="#0F6E56">5 cities × 90-day archive</text>
<!-- Source to Kafka arrows -->
<path d="M177 112 L177 142 L220 142 L220 150" fill="none" stroke="#993C1D" stroke-width="1.2" marker-end="url(#arrow)"/>
<path d="M493 112 L493 142 L460 142 L460 150" fill="none" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow)"/>
<!-- Kafka topics -->
<rect x="62" y="150" width="244" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-size="12" font-weight="600" x="184" y="176" text-anchor="middle" fill="#3C3489">Kafka: batch-github-repos</text>
<rect x="374" y="150" width="244" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-size="12" font-weight="600" x="496" y="176" text-anchor="middle" fill="#3C3489">Kafka: batch-weather-history</text>
<!-- Kafka to Spark arrows -->
<path d="M184 194 L184 222 L340 222 L340 234" fill="none" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrow)"/>
<path d="M496 194 L496 222 L340 222" fill="none" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrow)"/>
<!-- Spark -->
<rect x="62" y="234" width="520" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text font-size="12" font-weight="600" x="322" y="252" text-anchor="middle" fill="#0C447C">PySpark batch — deduplicate  →  enrich  →  feature engineering</text>
<!-- Airflow -->
<rect x="550" y="234" width="86" height="44" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text font-size="12" font-weight="600" x="593" y="252" text-anchor="middle" fill="#633806">Airflow</text>
<text font-size="11" x="593" y="270" text-anchor="middle" fill="#854F0B">daily 02:00 WIB</text>
<!-- Spark to Postgres -->
<line x1="322" y1="278" x2="322" y2="314" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- PostgreSQL staging -->
<rect x="62" y="314" width="520" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-size="12" font-weight="600" x="322" y="334" text-anchor="middle" fill="#444441">PostgreSQL staging  |  github_repositories  +  historical_weather</text>
<!-- Postgres to S3 -->
<path d="M220 358 L220 380 L184 380 L184 394" fill="none" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/>
<!-- S3 to Redshift -->
<path d="M270 416 L360 416" fill="none" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#arrow)"/>
<text font-size="11" fill="#888" x="316" y="408" text-anchor="middle">COPY</text>
<!-- S3 -->
<rect x="62" y="394" width="200" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-size="12" font-weight="600" x="162" y="414" text-anchor="middle" fill="#444441">Amazon S3</text>
<text font-size="11" x="162" y="430" text-anchor="middle" fill="#5F5E5A">Parquet staging</text>
<!-- Redshift -->
<rect x="374" y="394" width="244" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-size="12" font-weight="600" x="496" y="414" text-anchor="middle" fill="#712B13">Amazon Redshift</text>
<text font-size="11" x="496" y="430" text-anchor="middle" fill="#993C1D">DISTKEY  |  SORTKEY  |  AZ64</text>
</svg>
