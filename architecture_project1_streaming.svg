<svg width="100%" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" style="font-family:sans-serif;background:#fff">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<rect width="680" height="420" fill="#fafafa" rx="12"/>
<!-- Title -->
<text font-size="13" font-weight="600" x="340" y="28" text-anchor="middle" fill="#1a1a1a">Project 1 — Real-Time IoT Sensor Streaming Pipeline</text>
<!-- Layer labels -->
<text font-size="11" fill="#888" x="28" y="92" text-anchor="middle">Source</text>
<text font-size="11" fill="#888" x="28" y="192" text-anchor="middle">Ingest</text>
<text font-size="11" fill="#888" x="28" y="272" text-anchor="middle">Process</text>
<text font-size="11" fill="#888" x="28" y="352" text-anchor="middle">Store</text>
<!-- Lane lines -->
<line x1="55" y1="136" x2="645" y2="136" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="4 3"/>
<line x1="55" y1="226" x2="645" y2="226" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="4 3"/>
<line x1="55" y1="306" x2="645" y2="306" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="4 3"/>
<!-- Source: Open-Meteo -->
<rect x="62" y="58" width="100" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="12" font-weight="600" x="112" y="82" text-anchor="middle" fill="#085041">Open-Meteo</text>
<text font-size="11" x="112" y="98" text-anchor="middle" fill="#0F6E56">API (free)</text>
<!-- Sensor pills -->
<rect x="176" y="66" width="64" height="36" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="11" x="208" y="88" text-anchor="middle" fill="#085041">SNS-JKT</text>
<rect x="248" y="66" width="64" height="36" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="11" x="280" y="88" text-anchor="middle" fill="#085041">SNS-SBY</text>
<rect x="320" y="66" width="64" height="36" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="11" x="352" y="88" text-anchor="middle" fill="#085041">SNS-MDN</text>
<rect x="392" y="66" width="64" height="36" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="11" x="424" y="88" text-anchor="middle" fill="#085041">SNS-BDG</text>
<rect x="464" y="66" width="64" height="36" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="11" x="496" y="88" text-anchor="middle" fill="#085041">SNS-MKS</text>
<text font-size="11" fill="#888" x="558" y="78">5 sensor nodes</text>
<text font-size="11" fill="#888" x="558" y="93">60s poll interval</text>
<!-- Source arrows to Kafka -->
<line x1="208" y1="102" x2="208" y2="148" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="280" y1="102" x2="272" y2="148" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="352" y1="102" x2="340" y2="148" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="424" y1="102" x2="408" y2="148" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="496" y1="102" x2="476" y2="148" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)"/>
<!-- Kafka -->
<rect x="62" y="148" width="520" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-size="12" font-weight="600" x="322" y="172" text-anchor="middle" fill="#3C3489">Apache Kafka</text>
<text font-size="11" x="322" y="190" text-anchor="middle" fill="#534AB7">topic: iot-weather-sensors  |  5 partitions  |  GZIP  |  7-day retention</text>
<!-- Kafka to Spark arrow -->
<line x1="322" y1="204" x2="322" y2="238" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- Spark -->
<rect x="62" y="238" width="520" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text font-size="12" font-weight="600" x="322" y="260" text-anchor="middle" fill="#0C447C">PySpark Structured Streaming</text>
<text font-size="11" x="322" y="278" text-anchor="middle" fill="#185FA5">schema parse  →  watermark 2 min  →  5-min tumbling window  →  z-score anomaly</text>
<!-- Spark to stores -->
<path d="M200 294 L200 318 L160 318 L160 348" fill="none" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M450 294 L450 318 L490 318 L490 348" fill="none" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- Sync arrow -->
<line x1="262" y1="376" x2="376" y2="376" stroke="#888" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arrow)"/>
<text font-size="11" fill="#888" x="320" y="368" text-anchor="middle">hourly Airflow sync</text>
<!-- Airflow badge -->
<rect x="550" y="318" width="90" height="36" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text font-size="12" font-weight="600" x="595" y="340" text-anchor="middle" fill="#633806">Airflow DAG</text>
<!-- PostgreSQL -->
<rect x="62" y="348" width="200" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-size="12" font-weight="600" x="162" y="370" text-anchor="middle" fill="#444441">PostgreSQL</text>
<text font-size="11" x="162" y="388" text-anchor="middle" fill="#5F5E5A">operational  |  dedup</text>
<!-- BigQuery -->
<rect x="390" y="348" width="192" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text font-size="12" font-weight="600" x="486" y="370" text-anchor="middle" fill="#0C447C">Google BigQuery</text>
<text font-size="11" x="486" y="388" text-anchor="middle" fill="#185FA5">analytics  |  dashboard</text>
</svg>
