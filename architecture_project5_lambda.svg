<line x1="182" y1="184" x2="182" y2="214" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="498" y1="184" x2="498" y2="214" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
