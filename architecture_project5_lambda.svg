<text font-size="13" font-weight="600" x="340" y="28" text-anchor="middle" fill="#1a1a1a">Project 5 — Lambda Architecture: CoinGecko Crypto Data Lake</text>
<!-- Source -->
<rect x="230" y="44" width="220" height="48" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
