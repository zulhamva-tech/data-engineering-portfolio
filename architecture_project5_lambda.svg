<text font-size="12" font-weight="600" x="498" y="158" text-anchor="middle" fill="#3C3489">Kafka: ohlcv-batch</text>
<text font-size="11" x="498" y="174" text-anchor="middle" fill="#534AB7">daily · 20 coins · 90d candles</text>
