<rect x="62" y="406" width="556" height="68" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text font-size="12" font-weight="600" x="340" y="426" text-anchor="middle" fill="#0C447C">Serving Layer — Cassandra unified query interface</text>
<text font-size="11" x="208" y="446" text-anchor="middle" fill="#185FA5">"What is BTC price NOW?"</text>
<text font-size="11" x="208" y="460" text-anchor="middle" fill="#185FA5">→ Cassandra &lt;5ms</text>
<text font-size="11" x="452" y="446" text-anchor="middle" fill="#185FA5">"30d MA + golden cross signal?"</text>
<text font-size="11" x="452" y="460" text-anchor="middle" fill="#185FA5">→ Snowflake (seconds)</text>
