<line x1="182" y1="264" x2="182" y2="306" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="498" y1="264" x2="498" y2="306" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- Cassandra -->
<rect x="62" y="306" width="240" height="80" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-size="12" font-weight="600" x="182" y="326" text-anchor="middle" fill="#712B13">Apache Cassandra</text>
<text font-size="11" x="182" y="344" text-anchor="middle" fill="#993C1D">price_time_series (TTL 30d)</text>
<text font-size="11" x="182" y="360" text-anchor="middle" fill="#993C1D">latest_price_view → &lt;5ms reads</text>
<text font-size="11" x="182" y="376" text-anchor="middle" fill="#993C1D">PRIMARY KEY (coin_id, event_time)</text>
<!-- Snowflake -->
<rect x="378" y="306" width="240" height="80" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="12" font-weight="600" x="498" y="326" text-anchor="middle" fill="#085041">Snowflake</text>
<text font-size="11" x="498" y="344" text-anchor="middle" fill="#0F6E56">CRYPTO_DW.ANALYTICS</text>
<text font-size="11" x="498" y="360" text-anchor="middle" fill="#0F6E56">CRYPTO_OHLCV_HISTORY</text>
<text font-size="11" x="498" y="376" text-anchor="middle" fill="#0F6E56">clustered by coin_id + candle_date</text>
