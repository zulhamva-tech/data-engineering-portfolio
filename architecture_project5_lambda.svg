<rect x="290" y="218" width="100" height="42" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text font-size="10" font-weight="600" x="340" y="234" text-anchor="middle" fill="#633806">Airflow</text>
<text font-size="10" x="340" y="248" text-anchor="middle" fill="#854F0B">speed: */5min</text>
<text font-size="10" x="340" y="260" text-anchor="middle" fill="#854F0B">batch: 04:00 WIB</text>
